name: API tests with Allure report

on:
  push:
    branches: [ master, main, api-tests, ci-debug ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

env:
  BASE_URL: http://localhost:8080

permissions:
  contents: write

jobs:

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout test repository
        uses: actions/checkout@v4

      - name: Checkout server repository
        uses: actions/checkout@v4
        with:
          repository: sun6r0/test-service
          path: server

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven

      - name: Start PostgreSQL
        run: |
          cd server
          docker compose up -d postgres
          cd ..

      - name: Wait for PostgreSQL
        run: |
          echo "Waiting for PostgreSQL..."
          for i in $(seq 1 30); do
            if docker exec server-postgres-1 pg_isready -U test -d test -q 2>/dev/null; then
              echo "PostgreSQL is ready"
              exit 0
            fi
            echo "Attempt $i/30: PostgreSQL not ready, waiting 2 seconds..."
            sleep 2
          done
          echo "PostgreSQL did not start"
          cd server && docker compose logs postgres --tail=50 && cd ..
          exit 1

      - name: Run migrations
        run: |
          cd server
          docker compose up migrate
          cd ..

      - name: Start API server
        run: |
          cd server
          docker compose up -d service
          cd ..

      - name: Wait for API server
        run: |
          echo "Waiting for server on http://localhost:8080 ..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/getAll 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Server is ready (HTTP 200)"
              exit 0
            fi
            echo "Attempt $i/30: status $STATUS, waiting 2 seconds..."
            sleep 2
          done
          echo "Server did not start in 60 seconds"
          cd server && docker compose logs service --tail=100 && cd ..
          exit 1

      - name: Run API tests
        run: mvn clean test
        env:
          BASE_URL: ${{ env.BASE_URL }}

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results
          retention-days: 7

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: target/surefire-reports
          retention-days: 7

      - name: Stop server
        if: always()
        run: |
          cd server
          docker compose down
          cd ..

  allure-report:
    needs: test
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: target/allure-results

      - name: Install Allure CLI
        run: |
          wget -q https://github.com/allure-framework/allure2/releases/download/2.25.0/allure-2.25.0.tgz
          tar -xzf allure-2.25.0.tgz
          echo "$(pwd)/allure-2.25.0/bin" >> $GITHUB_PATH

      - name: Generate Allure report
        run: |
          allure generate target/allure-results --clean -o allure-report

      - name: Deploy report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report